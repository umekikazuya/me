name: me

x-logging-default: &logging-default
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-aws-env: &aws-env
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: testtest
  AWS_DEFAULT_REGION: ap-northeast-1

services:
  dynamodb:
    image: amazon/dynamodb-local:3.3.0
    container_name: me-dynamodb
    command: "-jar DynamoDBLocal.jar -dbPath /home/dynamodblocal/data -sharedDb"
    user: root
    ports:
      - "${DYNAMODB_PORT}:8000"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -s http://localhost:8000 > /dev/null 2>&1 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *logging-default
    networks:
      - local_network

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile.api
    container_name: me-api
    init: true
    ports:
      - "${BACKEND_PORT}:8080"
    volumes:
      - ../../backend:/app
    environment:
      TZ: Asia/Tokyo
      <<: *aws-env
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb:8000
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--no-verbose"
        - "--tries=1"
        - "--spider"
        - "http://localhost:8080/up"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *logging-default
    networks:
      - local_network

volumes:
  dynamodb-data:

networks:
  local_network:
