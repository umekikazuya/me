[tools]
air = "v1.65.1"
"aqua:mfridman/tparse" = "latest"
go = "1.26.1"
node = "24"
pnpm = "10"

[env]

# --- Required ---

COMPOSE_FILE = { value = "build/docker/compose.yml" }

# --- AWS (local dev) ---

AWS_ACCESS_KEY_ID     = { value = "test" }
AWS_SECRET_ACCESS_KEY = { value = "testtest" }
AWS_DEFAULT_REGION    = { value = "ap-northeast-1" }
DYNAMODB_TABLE_NAME   = { value = "me." }

# --- Optional ---

API_PORT              = { value = "8000" }
FLOCI_PORT            = { value = "4566" }
SWAGGER_PORT          = { value = "8001" }
ME_ID                 = { value = "" }
JWT_SECRET            = { value = "" }